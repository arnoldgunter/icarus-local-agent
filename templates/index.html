<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Icarus Local AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="eyebrow">READ-ONLY LOCAL AGENT</div>
        <h1>Icarus</h1>
      </div>
      <label class="model-picker">
        <span>Model</span>
        <select id="model">
          {% for m in models %}
          <option value="{{m}}">{{m}}</option>
          {% endfor %}
        </select>
      </label>
    </header>

    <main id="chat" class="chat"></main>

    <section id="attachments" class="attachments" hidden></section>

    <form class="composer" onsubmit="send(event)">
      <label class="upload-button" title="Datei hochladen">
        +
        <input id="fileInput" type="file" multiple />
      </label>
      <textarea id="msg" placeholder="Nachricht schreiben…" rows="1" autocomplete="off"></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const attachments = document.getElementById("attachments");

    let pendingUploads = [];

    let chatId = localStorage.getItem("icarus_chat_id");
    if (!chatId) {
      chatId = crypto.randomUUID();
      localStorage.setItem("icarus_chat_id", chatId);
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 220) + "px";
    }

    input.addEventListener("input", autoResize);
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send(e);
      }
    });

    fileInput.addEventListener("change", async function() {
      const files = Array.from(fileInput.files || []);
      for (const file of files) {
        await uploadFile(file);
      }
      fileInput.value = "";
      renderAttachments();
    });

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        addMessage("ai", `Upload fehlgeschlagen: ${data.error || "Unbekannter Fehler"}`);
        return;
      }

      pendingUploads.push(data);
    }

    function renderAttachments() {
      attachments.innerHTML = "";
      attachments.hidden = pendingUploads.length === 0;

      for (const file of pendingUploads) {
        const chip = document.createElement("div");
        chip.className = "attachment-chip";
        chip.innerHTML = `
          <span>${escapeHtml(file.original_name || file.filename || file.stored_name)}</span>
          <small>${Math.round((file.size_bytes || 0) / 1024)} KB</small>
          <button type="button" onclick="removeAttachment('${file.stored_name}')">×</button>
        `;
        attachments.appendChild(chip);
      }
    }

    function removeAttachment(storedName) {
      pendingUploads = pendingUploads.filter(f => f.stored_name !== storedName);
      renderAttachments();
    }

    function formatTime(ms) {
      if (!ms && ms !== 0) return "—";
      if (ms < 1000) return `${Math.round(ms)} ms`;
      return `${(ms / 1000).toFixed(2)} s`;
    }

    function addMessage(sender, text, meta = null) {
      const article = document.createElement("article");
      article.className = `message ${sender}`;

      const label = document.createElement("div");
      label.className = "message-label";
      label.textContent = sender === "user" ? "You" : "Icarus";

      const content = document.createElement("div");
      content.className = "message-content";

      if (sender === "ai") {
        content.innerHTML = marked.parse(text || "", {
          breaks: true,
          gfm: true
        });
      } else {
        content.textContent = text || "";
      }

      article.appendChild(label);
      article.appendChild(content);

      if (meta) {
        const stats = document.createElement("div");
        stats.className = "message-stats";
        stats.innerHTML = `
          <span>${formatTime(meta.client_ms)}</span>
          <span>${meta.prompt_tokens ?? "—"} prompt</span>
          <span>${meta.completion_tokens ?? "—"} output</span>
          <span>${meta.total_tokens ?? "—"} total</span>
        `;
        article.appendChild(stats);
      }

      chat.appendChild(article);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send(event) {
      if (event) event.preventDefault();

      const text = input.value.trim();
      const files = [...pendingUploads];

      if (!text && files.length === 0) return;

      const model = document.getElementById("model").value;

      let shown = text;
      if (files.length) {
        shown += `\n\nUploads:\n` + files.map(f => `- ${f.original_name || f.filename || f.stored_name}`).join("\n");
      }

      addMessage("user", shown);

      input.value = "";
      pendingUploads = [];
      renderAttachments();
      autoResize();

      sendBtn.disabled = true;
      sendBtn.textContent = "…";

      const started = performance.now();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            model,
            uploaded_files: files,
            chat_id: chatId
          })
        });

        const data = await res.json();
        const client_ms = performance.now() - started;

        if (data.response === "COMMAND_APPROVAL_REQUIRED") {
          addCommandApproval(data);
          return;
        }

        addMessage("ai", data.response, {
          client_ms,
          prompt_tokens: data.prompt_tokens,
          completion_tokens: data.completion_tokens,
          total_tokens: data.total_tokens
        });
      } catch (err) {
        addMessage("ai", "Fehler: Keine Antwort vom lokalen Server.");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
        input.focus();
      }
    }

    function addCommandApproval(data) {
      const article = document.createElement("article");
      article.className = "message ai command-request";

      const validation = data.valid
        ? "Validiert: read-only erlaubt"
        : `Blockiert: ${data.validation_reason}`;

      article.innerHTML = `
        <div class="message-label">Terminal approval</div>
        <div class="message-content">
          <p>${escapeHtml(data.reason || "Command execution requested.")}</p>
          <pre><code>${escapeHtml(data.command)}</code></pre>
          <p class="validation ${data.valid ? "ok" : "bad"}">${escapeHtml(validation)}</p>
          <div class="approval-actions">
            <button ${data.valid ? "" : "disabled"} onclick="approveCommand('${data.command_id}', true)">Allow</button>
            <button onclick="approveCommand('${data.command_id}', false)">Deny</button>
          </div>
        </div>
      `;

      chat.appendChild(article);
      chat.scrollTop = chat.scrollHeight;
    }

    async function approveCommand(commandId, approved) {
      const model = document.getElementById("model").value;
      const started = performance.now();

      const res = await fetch("/approve-command", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          command_id: commandId,
          approved,
          model,
          chat_id: chatId
        })
      });

      const data = await res.json();
      const client_ms = performance.now() - started;

      addMessage("ai", data.response, {
        client_ms,
        prompt_tokens: data.prompt_tokens,
        completion_tokens: data.completion_tokens,
        total_tokens: data.total_tokens
      });
    }

    async function clearChatHistory() {
      await fetch("/history", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: chatId })
      });

      chat.innerHTML = "";
      addMessage("ai", "Chat-Verlauf wurde gelöscht.");
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(match) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[match];
      });
    }
  </script>
</body>
</html>
